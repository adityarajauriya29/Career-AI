version: "3.9"
services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: career_platform
      JWT_SECRET: change-me
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on: [mongo]
volumes:
  mongo_data:
